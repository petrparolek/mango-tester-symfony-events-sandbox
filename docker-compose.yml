version: '3.3'

services:
  web:
    build:
      context: .docker/apache
    volumes:
      - ./:/var/www/html
      - ./.docker/apache/sites-enabled/default.conf:/etc/apache2/sites-enabled/default.conf
      - ./.docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - ./.docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./.docker/cache:/cache
    ports:
      - '80:80'
    environment:
      MYSQL_HOST: database
      MYSQL_USER: mango-tester
      MYSQL_DATABASE: mango-tester
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
      PHP_IDE_CONFIG: serverName=localhost
    extra_hosts:
      - host.docker.internal:host-gateway

  database:
    image: mariadb:11.4
    volumes:
      - ./.docker/database/data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: mango-tester
      MYSQL_PASSWORD: secret
      MYSQL_DATABASE: mango-tester

  adminer:
    image: adminer:5.4.0
    ports:
      - '8081:8080'
    environment:
      ADMINER_DEFAULT_SERVER: database

  composer:
    image: composer:latest
    volumes:
      - ./:/app
      - ./.docker/cache:/cache
    working_dir: /app
    command: composer install --ignore-platform-reqs
    environment:
      MYSQL_HOST: database
      MYSQL_USER: mango-tester
      MYSQL_DATABASE: mango-tester
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root

  console:
    image: webnazakazku/docker-php-build:8.1
    entrypoint: bash
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./.docker/cache:/cache
      - ./.docker/php/xdebug.ini:/etc/php/8.1/mods-available/xdebug.ini
      - ./.docker/php/custom.ini:/etc/php/8.1/cli/conf.d/custom.ini
      - ./.docker/console/root:/root
    environment:
      PHP_IDE_CONFIG: serverName=localhost
      MYSQL_HOST: database
      MYSQL_USER: mango-tester
      MYSQL_DATABASE: mango-tester
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    extra_hosts:
      - host.docker.internal:host-gateway
